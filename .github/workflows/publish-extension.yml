name: Publish VS Code Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      # Version bump (only on workflow_dispatch). Derives the *current* highest
      # version from git tags (NOT package.json) so a previous bump-push that
      # silently failed (e.g. branch protection) can't desync us. Writes the
      # new version into package.json in-place, then attempts to push it back
      # to master — but proceeds with the release even if the push is blocked,
      # since the tag is the source of truth.
      - name: Bump version and create tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Highest existing semver tag (strip leading v). Empty if no tags.
          LATEST_TAG=$(git tag --list 'v*' | sed 's/^v//' \
            | awk -F. '{printf "%010d.%010d.%010d %s.%s.%s\n",$1,$2,$3,$1,$2,$3}' \
            | sort | tail -1 | awk '{print $2}')
          if [ -z "$LATEST_TAG" ]; then
            CURRENT=$(node -p "require('./package.json').version")
          else
            CURRENT="$LATEST_TAG"
          fi
          echo "Current released version (from tags): $CURRENT"

          # Sync package.json to the latest tag before bumping.
          npm version --no-git-tag-version "$CURRENT" --allow-same-version

          # Now bump from the synced state.
          NEW=$(npm version ${{ github.event.inputs.bump }} -m "chore: release v%s" | tail -1)
          echo "Bumped to: $NEW"

          # Best-effort push of the bump commit to master. Don't fail the run
          # if branch protection blocks it — the tag is what really matters.
          git push origin HEAD:${{ github.ref_name }} || \
            echo "::warning::Could not push version bump commit to ${{ github.ref_name }} (branch protection?). The tag still went out; sync package.json manually if needed."
          git push origin --tags

      # Get version for release name
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION=$(node -p "require('./package.json').version")
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      # Package extension
      - name: Package extension
        run: npx @vscode/vsce package -o gatekeeper-${{ steps.version.outputs.version }}.vsix

      # Create GitHub Release with VSIX attached
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: vscode-extension/gatekeeper-${{ steps.version.outputs.version }}.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to VS Code Marketplace (tolerate already-published versions)
      - name: Publish to VS Code Marketplace
        run: |
          set +e
          OUTPUT=$(npx @vscode/vsce publish --packagePath gatekeeper-${{ steps.version.outputs.version }}.vsix -p ${{ secrets.VSCE_PAT }} 2>&1)
          EXIT=$?
          echo "$OUTPUT"
          if [ $EXIT -ne 0 ] && echo "$OUTPUT" | grep -qi 'already exists'; then
            echo "::warning::Version ${{ steps.version.outputs.version }} already on marketplace — skipping publish."
            exit 0
          fi
          exit $EXIT
