name: Publish VS Code Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (leave empty to publish current version)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Publish to VS Code Marketplace
        run: |
          if [ -n "${{ github.event.inputs.bump }}" ]; then
            npx @vscode/vsce publish ${{ github.event.inputs.bump }} -p ${{ secrets.VSCE_PAT }}
          else
            npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }}
          fi
